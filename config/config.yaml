app:
  name: "Land Tax Assessment API"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5500"      # python -m http.server 5500
    - "http://127.0.0.1:5500"
    - "http://localhost:8080"      # other common dev ports
    - "http://127.0.0.1:8080"
    - "http://localhost:3000"      # node/vite dev server
    - "http://127.0.0.1:3000"
    - "https://mqchzvsw-5500.asse.devtunnels.ms/"  
    - "null"                       # file:// origin (เปิด html โดยตรง)
  # Dev shortcut: set CORS_ALLOW_ALL=true ใน .env เพื่อ allow * ทั้งหมด

vertex_ai:
  model: "gemini-2.5-flash"   # "gemini-2.5-pro" มีความสามารถมากกว่าแต่ราคาแพงกว่า
  location: "us-central1"         # asia-southeast1 ใกล้ไทยกว่า
  max_tokens: 6512
  temperature: 0.0
  timeout: 60

google_maps:
  map_type: "satellite"
  image_size: "512x512"
  default_zoom: 18

tax:
  default_land_price_per_sqwah: 10000
  vacant_land_increment_years: 3
  vacant_land_max_rate: 0.03